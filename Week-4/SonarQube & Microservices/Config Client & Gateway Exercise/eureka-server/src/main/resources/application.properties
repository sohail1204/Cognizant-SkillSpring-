# Eureka Server Configuration
server.port=8761
spring.application.name=eureka-server

# Standalone Eureka Server Configuration
# Tell the client library to not register itself with this Eureka instance
eureka.client.register-with-eureka=false
# Tell the client library to not fetch the registry from other Eureka instances
eureka.client.fetch-registry=false

# Disable self-preservation in development mode to immediately evict failed instances
eureka.server.enable-self-preservation=false
eureka.server.eviction-interval-timer-in-ms=5000
