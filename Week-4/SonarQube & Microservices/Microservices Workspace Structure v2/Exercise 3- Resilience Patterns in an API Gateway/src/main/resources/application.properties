# ===================================================================
# Spring Boot Configuration
# ===================================================================
spring.application.name=api-gateway-resilience
server.port=8080

# ===================================================================
# Spring Cloud Gateway Routing Configuration
# ===================================================================
# Route ID: example_route
spring.cloud.gateway.routes[0].id=example_route

# Target URI: The downstream service to route requests to
spring.cloud.gateway.routes[0].uri=http://example.org

# Predicate: Match any request path starting with /example/
spring.cloud.gateway.routes[0].predicates[0]=Path=/example/**

# Gateway Filter: CircuitBreaker
# - name: name of the circuit breaker instance ('exampleCircuitBreaker')
# - fallbackUri: forwards requests to the local gateway endpoint /fallback if downstream fails/times out
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=exampleCircuitBreaker,forward:/fallback

# ===================================================================
# Resilience4j Circuit Breaker Configuration for 'exampleCircuitBreaker'
# ===================================================================
# 1. Sliding Window Size: Configures the number of calls to record in the closed state.
# Here it is set to 10. The circuit breaker needs at least 10 calls to evaluate the failure rate.
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.sliding-window-size=10

# 2. Failure Rate Threshold: The percentage threshold above which the circuit breaker transitions from CLOSED to OPEN.
# Here, if 50% or more of the last 10 calls fail, the circuit will open.
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.failure-rate-threshold=50

# 3. Health Indicator: Registers this circuit breaker with Spring Boot Actuator so its state is exposed in /actuator/health.
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.register-health-indicator=true

# 4. Wait Duration in Open State: The time that the Circuit Breaker should remain open before transitioning to half-open.
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.wait-duration-in-open-state=10s

# 5. Permitted Calls in Half-Open State: Configures the number of calls allowed in the half-open state to test the backend.
resilience4j.circuitbreaker.instances.exampleCircuitBreaker.permitted-number-of-calls-in-half-open-state=3

# ===================================================================
# Resilience4j Time Limiter Configuration for 'exampleCircuitBreaker'
# ===================================================================
# 6. Timeout: Configures the thread execution time limit.
# If the downstream call takes longer than 2 seconds, it will time out and trigger the fallback.
resilience4j.timelimiter.instances.exampleCircuitBreaker.timeout-duration=2s

# ===================================================================
# Spring Boot Actuator Monitoring Configuration
# ===================================================================
# Expose actuator endpoints to monitor routes and resilience metrics
management.endpoints.web.exposure.include=health,info,gateway,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
