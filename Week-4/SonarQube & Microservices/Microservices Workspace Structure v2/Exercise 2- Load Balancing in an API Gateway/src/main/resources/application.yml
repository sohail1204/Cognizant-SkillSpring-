server:
  port: 8080

spring:
  application:
    name: gateway-loadbalancer
  
  cloud:
    gateway:
      routes:
        # Route for Employee Service with Load Balancing enabled (lb:// scheme)
        - id: load-balanced-route
          uri: lb://employee-service
          predicates:
            - Path=/employees/**
          filters:
            # Let's add a custom header to indicate it was routed by our gateway
            - AddResponseHeader=X-Gateway-Route-ID, load-balanced-route

        # Route for Department Service with Load Balancing enabled
        - id: department-route
          uri: lb://department-service
          predicates:
            - Path=/departments/**
          filters:
            - AddResponseHeader=X-Gateway-Route-ID, department-route

    # Static service instances setup for Spring Cloud LoadBalancer
    # This allows testing the load balancer client without running Eureka
    discovery:
      client:
        simple:
          instances:
            employee-service:
              - uri: http://localhost:8081
                instanceId: employee-instance-1
                metadata:
                  version: v1
              - uri: http://localhost:8082
                instanceId: employee-instance-2
                metadata:
                  version: v1
              - uri: http://localhost:8083
                instanceId: employee-instance-3
                metadata:
                  version: v1
            department-service:
              - uri: http://localhost:8084
                instanceId: department-instance-1
                metadata:
                  version: v1
              - uri: http://localhost:8085
                instanceId: department-instance-2
                metadata:
                  version: v1

# Actuator configuration for management & monitoring
management:
  endpoints:
    web:
      exposure:
        include: "health,gateway,info,metrics"
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# Logging configuration
logging:
  level:
    root: INFO
    # WebFlux and Gateway Core logging
    org.springframework.web.reactive: DEBUG
    org.springframework.cloud.gateway: TRACE
    # Spring Cloud LoadBalancer logging
    org.springframework.cloud.loadbalancer: DEBUG
    # Custom Application packages
    com.cognizant.gatewayloadbalancer: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
