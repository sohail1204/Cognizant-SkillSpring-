# Server Port
server.port=9090

# Application Name
spring.application.name=api-gateway

# Eureka Registry Settings
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Spring Cloud Gateway Routing Configuration
# Route 1: Explicit Route for Greet Service with Path Rewriting
spring.cloud.gateway.routes[0].id=greet-service-route
spring.cloud.gateway.routes[0].uri=lb://greet-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/greet-service/**
# Strips the /greet-service prefix before forwarding.
# For example, http://localhost:9090/greet-service/greet -> http://greet-service/greet
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/greet-service/(?<segment>.*), /$\\{segment\\}

# Enable Service Discovery Integration
# Allows dynamic routing based on Eureka service registration names
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
