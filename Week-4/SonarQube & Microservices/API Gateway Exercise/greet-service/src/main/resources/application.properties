# Application name registered with service discovery
spring.application.name=greet-service

# Port on which greet-service runs
server.port=8081

# Location of the Eureka Discovery Server where this client will register itself
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Log configuration
logging.level.com.example.greet=DEBUG
logging.level.org.springframework.web=INFO
