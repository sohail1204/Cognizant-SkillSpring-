version: '3.8'

services:
  mysql-db:
    image: mysql:8.0.36
    container_name: microservices-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - microservices-network

volumes:
  db-data:

networks:
  microservices-network:
    driver: bridge
